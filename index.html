<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Florish</title>
  <style>
    :root {
      --sage: #87A878;
      --sage-dark: #6b8f5e;
      --cream: #FAF7F2;
      --dusty-rose: #E8B4B8;
      --terracotta: #C17A5A;
      --warm-white: #FFFEF9;
      --primary: #87A878;
      --primary-light: #9fb98d;
      --accent: #C17A5A;
      --bg: #FAF7F2;
      --card-bg: #FFFEF9;
      --text: #4a4a4a;
      --text-light: #7a7a7a;
      --border: #e8e4de;
      --water: #7BA3C9;
      --success: #87A878;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
      background-image: radial-gradient(circle at 20% 80%, rgba(135, 168, 120, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(232, 180, 184, 0.1) 0%, transparent 50%);
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      color: var(--sage-dark);
      margin-bottom: 24px;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .add-plant-form {
      background: var(--card-bg);
      padding: 24px;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(135, 168, 120, 0.15);
      margin-bottom: 24px;
      border: 1px solid rgba(135, 168, 120, 0.2);
    }

    .add-plant-form h2 {
      font-size: 1.2rem;
      margin-bottom: 16px;
      color: var(--text);
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.9rem;
      color: var(--text-light);
      margin-bottom: 8px;
      font-weight: 500;
    }

    input, select {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 1rem;
      background: var(--cream);
      transition: all 0.2s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--sage);
      box-shadow: 0 0 0 3px rgba(135, 168, 120, 0.15);
    }

    .care-info {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }

    .care-info .care-display {
      padding: 12px;
      font-size: 0.85rem;
      background: var(--cream);
      border: 2px solid var(--border);
      border-radius: 12px;
      color: var(--text);
    }

    .care-info .care-display.water { border-left: 4px solid var(--water); }
    .care-info .care-display.light { border-left: 4px solid #E8B4B8; }
    .care-info .care-display.soil { border-left: 4px solid var(--terracotta); }

    .care-info .care-label {
      display: block;
      font-size: 0.7rem;
      color: var(--text-light);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .care-info .care-value {
      font-weight: 600;
    }

    .suggestion-box {
      position: absolute;
      background: var(--card-bg);
      border: 2px solid var(--border);
      border-radius: 12px;
      max-height: 220px;
      overflow-y: auto;
      z-index: 100;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    }

    .suggestion-box.show {
      display: block;
    }

    .suggestion-item {
      padding: 12px 16px;
      cursor: pointer;
      transition: all 0.15s;
      border-bottom: 1px solid var(--border);
    }

    .suggestion-item:last-child {
      border-bottom: none;
    }

    .suggestion-item:hover {
      background: var(--cream);
    }

    .species-group {
      position: relative;
    }

    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--sage) 0%, var(--sage-dark) 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(135, 168, 120, 0.3);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(135, 168, 120, 0.4);
    }

    .plants-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .plant-card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      border: 1px solid rgba(135, 168, 120, 0.1);
      transition: all 0.3s;
    }

    .plant-card:hover {
      box-shadow: 0 8px 24px rgba(135, 168, 120, 0.15);
      transform: translateY(-2px);
    }

    .plant-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .plant-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .plant-info {
      flex: 1;
    }

    .plant-name {
      font-weight: 700;
      font-size: 1.15rem;
      color: var(--text);
    }

    .plant-nickname {
      color: var(--text-light);
      font-size: 0.9rem;
      font-style: italic;
    }

    .watered-badge {
      background: var(--water);
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .watered-today {
      background: var(--success);
    }

    .care-details {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .care-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      color: var(--text-light);
    }

    .care-icon {
      font-size: 1rem;
    }

    .water-btn {
      width: auto;
      padding: 12px 24px;
      background: var(--water);
      font-size: 0.9rem;
      border-radius: 12px;
    }

    .water-btn:hover {
      background: #6a93b8;
    }

    .water-btn.watered {
      background: var(--success);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
    }

    .empty-icon {
      font-size: 4rem;
      margin-bottom: 16px;
    }

    .delete-btn {
      background: transparent;
      color: #999;
      padding: 4px 8px;
      width: auto;
      font-size: 0.8rem;
    }

    .delete-btn:hover {
      background: #fee;
      color: #c00;
    }

    .care-expanded {
      background: #f8faf6;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 14px;
    }

    .care-expanded-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .care-detail-row {
      display: flex;
      gap: 12px;
      margin-bottom: 8px;
      font-size: 0.85rem;
    }

    .care-detail-row:last-child {
      margin-bottom: 0;
    }

    .care-detail-label {
      min-width: 80px;
      color: var(--text-light);
      font-weight: 500;
    }

    .care-detail-value {
      color: var(--text);
    }

    .leaf-signals {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .leaf-signal {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
    }

    .leaf-signal.underwater {
      background: #fff3e0;
      color: #e65100;
    }

    .leaf-signal.overwater {
      background: #e3f2fd;
      color: #1565c0;
    }

    /* Personality & Mood Styles */
    .personality-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 8px;
    }

    .personality-badge.dramatic {
      background: linear-gradient(135deg, #fce4ec 0%, #f8bbd9 100%);
      color: #c2185b;
    }

    .personality-badge.chill {
      background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
      color: #2e7d32;
    }

    .personality-badge.resilient {
      background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
      color: #ef6c00;
    }

    .personality-badge.diva {
      background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%);
      color: #7b1fa2;
    }

    .personality-badge.mysterious {
      background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 100%);
      color: #00838f;
    }

    .personality-badge.cheerful {
      background: linear-gradient(135deg, #fce4ec 0%, #ffcdd2 100%);
      color: #d81b60;
    }

    .mood-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .mood-indicator.thriving {
      background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
      color: #2e7d32;
    }

    .mood-indicator.happy {
      background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
      color: #1565c0;
    }

    .mood-indicator.okay {
      background: linear-gradient(135deg, #fff8e1 0%, #ffecb3 100%);
      color: #f57f17;
    }

    .mood-indicator.droopy {
      background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
      color: #e65100;
    }

    .mood-indicator.struggling {
      background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%);
      color: #c62828;
    }

    .voice-message {
      font-style: italic;
      font-size: 0.9rem;
      color: var(--text-light);
      padding: 10px 14px;
      background: var(--cream);
      border-radius: 12px;
      margin-bottom: 14px;
      border-left: 3px solid var(--sage);
    }
  </style>
</head>

        leafSignals: { underwater: 'Wilting', overwater: 'Yellow leaves' },
        waterAmount: 'thorough'
      }
    };

    let plants = JSON.parse(localStorage.getItem('plants') || '[]');
    let currentSuggestion = null;

    function savePlants() {
      localStorage.setItem('plants', JSON.stringify(plants));
    }

    function getToday() {
      return new Date().toDateString();
    }

    // Auto-suggest functionality
    const speciesInput = document.getElementById('species');
    const suggestionsBox = document.getElementById('suggestions');

    speciesInput.addEventListener('input', function() {
      const query = this.value.toLowerCase().trim();
      
      if (query.length < 2) {
        suggestionsBox.classList.remove('show');
        return;
      }

      const matches = Object.keys(plantDatabase)
        .filter(name => name.toLowerCase().includes(query))
        .slice(0, 8);

      if (matches.length === 0) {
        suggestionsBox.classList.remove('show');
        return;
      }

      suggestionsBox.innerHTML = matches.map(name => {
        const plant = plantDatabase[name];
        return `<div class="suggestion-item" data-name="${name}">
          <strong>${name}</strong><br>
          <small>💧 ${plant.waterDays} days • ☀️ ${plant.light}</small>
        </div>`;
      }).join('');

      suggestionsBox.classList.add('show');
    });

    suggestionsBox.addEventListener('click', function(e) {
      const item = e.target.closest('.suggestion-item');
      if (item) {
        const name = item.dataset.name;
        speciesInput.value = name;
        applyPlantCare(plantDatabase[name]);
        suggestionsBox.classList.remove('show');
      }
    });

    document.addEventListener('click', function(e) {
      if (!e.target.closest('.species-group')) {
        suggestionsBox.classList.remove('show');
      }
    });

    function applyPlantCare(plant) {
      document.getElementById('waterDisplay').textContent = `Every ${plant.waterDays} days`;
      document.getElementById('lightDisplay').textContent = plant.light;
      document.getElementById('soilDisplay').textContent = plant.soil;
      currentSuggestion = plant;
    }

    function addPlant() {
      const species = document.getElementById('species').value.trim();
      
      // Get care info from suggestion or use defaults
      const suggested = plantDatabase[species] || currentSuggestion;
      const waterDays = suggested ? suggested.waterDays : 7;
      const lightNeeds = suggested ? suggested.light : 'Medium';
      const soilType = suggested ? suggested.soil : 'Regular';
      const waterMethod = suggested ? suggested.waterMethod : 'top';
      const waterNotes = suggested ? suggested.waterNotes : 'Water thoroughly, let drain';
      const soilDrynessCheck = suggested ? suggested.soilDrynessCheck : 'Check top inch; water when dry';
      const leafSignals = suggested ? suggested.leafSignals : { underwater: 'Wilting leaves', overwater: 'Yellow leaves' };
      const waterAmount = suggested ? suggested.waterAmount : 'moderate';

      if (!species) {
        alert('Please enter a species name');
        return;
      }

      const plant = {
        id: Date.now(),
        species,
        waterDays: waterDays,
        lightNeeds: lightNeeds,
        soilType: soilType,
        waterMethod: waterMethod,
        waterNotes: waterNotes,
        soilDrynessCheck: soilDrynessCheck,
        leafSignals: leafSignals,
        waterAmount: waterAmount,
        lastWatered: null
      };

      plants.push(plant);
      savePlants();
      renderPlants();

      // Clear form
      document.getElementById('species').value = '';
      document.getElementById('waterDisplay').textContent = '—';
      document.getElementById('lightDisplay').textContent = '—';
      document.getElementById('soilDisplay').textContent = '—';
      currentSuggestion = null;
    }

    function waterPlant(id) {
      const plant = plants.find(p => p.id === id);
      if (plant) {
        plant.lastWatered = getToday();
        savePlants();
        renderPlants();
      }
    }

    function deletePlant(id) {
      if (confirm('Remove this plant?')) {
        plants = plants.filter(p => p.id !== id);
        savePlants();
        renderPlants();
      }
    }

    function formatCare(plant) {
      return {
        water: `Every ${plant.waterDays} days`,
        light: plant.lightNeeds,
        soil: plant.soilType
      };
    }

    function renderPlants() {
      const list = document.getElementById('plantsList');
      
      if (plants.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🌿</div>
            <p>No plants yet. Add your first plant above!</p>
          </div>
        `;
        return;
      }

      // Personality emoji mapping
      const personalityEmojis = {
        'Dramatic': '🎭',
        'Chill': '😌',
        'Resilient': '💪',
        'Diva': '👑',
        'Mysterious': '🔮',
        'Cheerful': '☀️'
      };

      // Voice messages based on personality and mood
      const voiceMessages = {
        'Dramatic': {
          'Thriving': "Yes, I\'m absolutely stunning today. You may admire me. 🎭✨",
          'Happy': "I\'m feeling... adequate. But I could always use more attention.",
          'Okay': "I suppose this is fine. But I\'ll have you know I\'ve had better days.",
          'Droopy': "I\'m absolutely WILTING. It\'s been days. DAYS. Someone do something!",
          'Struggling': "This is it. This is how I die. Unwatered and forgotten..."
        },
        'Chill': {
          'Thriving': "Life is good. The sun is warm, the soil is moist. All is right in the world. 😌",
          'Happy': "Doing great, friend. No rush on anything.",
          'Okay': "No rush... but maybe water me sometime this week?",
          'Droopy': "Hey, I\'m getting a little thirsty over here. Whenever you\'re ready.",
          'Struggling': "Okay, I\'m definitely thirsty now. But I forgive you."
        },
        'Resilient': {
          'Thriving': "I\'m doing well. Tough as always. 💪",
          'Happy': "Still going strong. Nothing can stop me.",
          'Okay': "I\'ve been better, but I\'ve survived worse.",
          'Droopy': "I could use some water, but I\'m not going anywhere.",
          'Struggling': "Still here. Barely. But still here."
        },
        'Diva': {
          'Thriving': "Yes, I look incredible. You\'re welcome. 👑🌿",
          'Happy': "I\'m radiant as always. Keep doing whatever you\'re doing.",
          'Okay': "My leaves are starting to lose their luster. Do you know what that means?",
          'Droopy': "EXCUSE ME?! You\'re letting me DRY OUT?! Do you have ANY idea who I am?!",
          'Struggling': "My leaves are crisp. My stems are sad. This is a disaster."
        },
        'Mysterious': {
          'Thriving': "The spirits of the soil are content. I am... content. 🔮",
          'Happy': "The leaves whisper of moisture... for now.",
          'Okay': "Something is changing... I feel a dryness approaching.",
          'Droopy': "The leaves cry out in silence... for water.",
          'Struggling': "The shadows lengthen. My energy fades..."
        },
        'Cheerful': {
          'Thriving': "I\'m so happy I could bloom! 🌸 Everything is perfect!",
          'Happy': "Another day, another chance to grow! I\'m doing great!",
          'Okay': "I\'m doing okay! A little water would make my day!",
          'Droopy': "Oh no... I\'m feeling a bit droopy. Can you help?",
          'Struggling': "I\'m not feeling my best, but I believe in tomorrow!"
        }
      };

      // Get personality for a plant
      function getPlantPersonality(species) {
        const dbEntry = plantDatabase[species];
        if (dbEntry && dbEntry.personality) return dbEntry.personality;
        // Default personality based on common plant types
        if (species.toLowerCase().includes('cactus') || species.toLowerCase().includes('succulent')) return 'Resilient';
        if (species.toLowerCase().includes('pothos') || species.toLowerCase().includes('snake') || species.toLowerCase().includes('zz')) return 'Chill';
        if (species.toLowerCase().includes('monstera') || species.toLowerCase().includes('bird of paradise')) return 'Diva';
        if (species.toLowerCase().includes('orchid') || species.toLowerCase().includes('fig')) return 'Dramatic';
        if (species.toLowerCase().includes('air plant') || species.toLowerCase().includes('venus')) return 'Mysterious';
        return 'Cheerful';
      }

      // Calculate mood based on days since last watered
      function getPlantMood(plant) {
        if (!plant.lastWatered) return 'Struggling';
        const lastWatered = new Date(plant.lastWatered);
        const today = new Date();
        const daysSince = Math.floor((today - lastWatered) / (1000 * 60 * 60 * 24));
        const schedule = plant.waterDays || 7;
        
        if (daysSince <= schedule) return 'Thriving';
        if (daysSince === schedule + 1) return 'Happy';
        if (daysSince === schedule + 2) return 'Okay';
        if (daysSince >= schedule + 3 && daysSince <= schedule + 4) return 'Droopy';
        return 'Struggling';
      }

      // Get mood emoji
      const moodEmojis = {
        'Thriving': '🌟',
        'Happy': '😊',
        'Okay': '😐',
        'Droopy': '😟',
        'Struggling': '🆘'
      };

      list.innerHTML = plants.map(plant => {
        const care = formatCare(plant);
        const isWateredToday = plant.lastWatered === getToday();
        const leafSignals = plant.leafSignals || { underwater: 'Wilting leaves', overwater: 'Yellow leaves' };
        
        const personality = getPlantPersonality(plant.species);
        const mood = getPlantMood(plant);
        const personalityEmoji = personalityEmojis[personality] || '🌿';
        const moodEmoji = moodEmojis[mood] || '🌱';
        const voiceMessage = voiceMessages[personality]?.[mood] || "I\'m just a plant doing plant things.";
        
        return `
          <div class="plant-card">
            <div class="plant-card-header">
              <div class="plant-info">
                <span class="personality-badge ${personality.toLowerCase()}">${personalityEmoji} ${personality}</span>
                <div class="plant-name">${plant.species}</div>
              </div>
              ${isWateredToday ? '<span class="watered-badge watered-today">✓ Watered</span>' : ''}
            </div>
            <div class="mood-indicator ${mood.toLowerCase()}">${moodEmoji} ${mood}</div>
            <div class="voice-message">"${voiceMessage}"</div>
            <div class="care-details">
              <span class="care-item"><span class="care-icon">💧</span> ${care.water}</span>
              <span class="care-item"><span class="care-icon">☀️</span> ${care.light}</span>
              <span class="care-item"><span class="care-icon">🪴</span> ${care.soil}</span>
            </div>
            <div class="care-expanded">
              <div class="care-expanded-title">Care Details</div>
              <div class="care-detail-row">
                <span class="care-detail-label">Method:</span>
                <span class="care-detail-value">${plant.waterMethod === 'top' ? 'Water from top' : plant.waterMethod === 'bottom' ? 'Water from bottom' : 'Top & center cup'}</span>
              </div>
              <div class="care-detail-row">
                <span class="care-detail-label">Amount:</span>
                <span class="care-detail-value">${plant.waterAmount === 'thorough' ? 'Thorough (soak)' : plant.waterAmount === 'moderate' ? 'Moderate' : 'Light (sparingly)'}</span>
              </div>
              <div class="care-detail-row">
                <span class="care-detail-label">How to check:</span>
                <span class="care-detail-value">${plant.soilDrynessCheck || 'Check top inch; water when dry'}</span>
              </div>
              <div class="care-detail-row">
                <span class="care-detail-label">Notes:</span>
                <span class="care-detail-value">${plant.waterNotes || 'Water thoroughly, let drain'}</span>
              </div>
              <div class="care-detail-row" style="flex-direction: column; gap: 4px;">
                <span class="care-detail-label">Leaf signals:</span>
                <div class="leaf-signals">
                  <span class="leaf-signal underwater">💧 ${leafSignals.underwater}</span>
                  <span class="leaf-signal overwater">🌧️ ${leafSignals.overwater}</span>
                </div>
              </div>
            </div>
            <div style="display: flex; gap: 10px;">
              <button class="water-btn ${isWateredToday ? 'watered' : ''}" onclick="waterPlant(${plant.id})">
                ${isWateredToday ? '✓ Watered Today' : '💧 Mark Watered'}
              </button>
              <button class="delete-btn" onclick="deletePlant(${plant.id})">Remove</button>
            </div>
          </div>
        `;
      }).join('');
    }

    // Initial render
    renderPlants();
  </script>
</body>
</html>
