<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Florish</title>
  <style>
    :root {
      --sage: #87A878;
      --sage-dark: #6b8f5e;
      --cream: #FAF7F2;
      --dusty-rose: #E8B4B8;
      --terracotta: #C17A5A;
      --warm-white: #FFFEF9;
      --primary: #7C8C5E;
      --primary-light: #9fb98d;
      --accent: #C17A5A;
      --bg: #F7F3EE;
      --card-bg: #FFFDF9;
      --text: #3D2E1E;
      --text-light: #8C7B6B;
      --border: #EDE8E0;
      --water: #6B9E78;
      --success: #87A878;
      --card-shadow: rgba(139, 109, 82, 0.08);
      --input-border: #D9D0C7;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
      background-image: radial-gradient(circle at 20% 80%, rgba(135, 168, 120, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(232, 180, 184, 0.1) 0%, transparent 50%);
    }

    .container { max-width: 500px; margin: 0 auto; }

    h1 {
      text-align: center;
      color: var(--sage-dark);
      margin-bottom: 24px;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .add-plant-form {
      background: var(--card-bg);
      padding: 24px;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(135, 168, 120, 0.15);
      margin-bottom: 24px;
      border: 1px solid rgba(135, 168, 120, 0.2);
    }

    .add-plant-form h2 { font-size: 1.2rem; margin-bottom: 16px; color: var(--text); font-weight: 600; }
    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 0.9rem;
      color: var(--text-light);
      margin-bottom: 8px;
      font-weight: 500;
    }

    input, select {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--input-border);
      border-radius: 12px;
      font-size: 1rem;
      background: var(--cream);
      transition: all 0.2s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--sage);
      box-shadow: 0 0 0 3px rgba(135, 168, 120, 0.15);
    }

    .care-info { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

    .care-info .care-display {
      padding: 12px;
      font-size: 0.85rem;
      background: var(--cream);
      border: 2px solid var(--border);
      border-radius: 12px;
      color: var(--text);
    }

    .care-info .care-display.water { border-left: 4px solid var(--water); }
    .care-info .care-display.light { border-left: 4px solid #E8B4B8; }
    .care-info .care-display.soil { border-left: 4px solid var(--terracotta); }

    .care-info .care-label {
      display: block;
      font-size: 0.7rem;
      color: var(--text-light);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .care-info .care-value { font-weight: 600; }

    .suggestion-box {
      position: absolute;
      background: var(--card-bg);
      border: 2px solid var(--border);
      border-radius: 12px;
      max-height: 220px;
      overflow-y: auto;
      z-index: 100;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      width: 100%;
    }

    .suggestion-box.show { display: block; }

    .suggestion-item {
      padding: 12px 16px;
      cursor: pointer;
      transition: all 0.15s;
      border-bottom: 1px solid var(--border);
    }

    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:hover { background: var(--cream); }
    .species-group { position: relative; }

    .nickname-group { display: flex; gap: 10px; }
    .nickname-group input { flex: 1; }

    .surprise-btn {
      width: auto;
      padding: 12px 18px;
      background: linear-gradient(135deg, var(--dusty-rose) 0%, var(--terracotta) 100%);
      font-size: 0.9rem;
    }

    .surprise-btn:hover { transform: scale(1.02); }

    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--sage-dark) 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(124, 140, 94, 0.3);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(124, 140, 94, 0.4);
    }

    /* Add Plant button bounce animation */
    @keyframes btnBounce {
      0% { transform: scale(1); }
      30% { transform: scale(0.94); }
      60% { transform: scale(1.04); }
      80% { transform: scale(0.98); }
      100% { transform: scale(1); }
    }

    .btn-bounce { animation: btnBounce 0.4s ease forwards; }

    /* Leaf float animation */
    @keyframes leafFloat {
      0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
      100% { opacity: 0; transform: translateY(-80px) rotate(25deg) scale(1.4); }
    }

    .leaf-float {
      position: fixed;
      pointer-events: none;
      font-size: 1.5rem;
      z-index: 999;
      animation: leafFloat 0.9s ease-out forwards;
    }

    /* Card slide-in animation */
    @keyframes cardSlideIn {
      0% { opacity: 0; transform: translateY(20px) scale(0.97); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .plant-card-new { animation: cardSlideIn 0.4s ease forwards; }

    /* Watering confirmation toast */
    #waterToast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--water);
      color: white;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 0.95rem;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1000;
      pointer-events: none;
      box-shadow: 0 4px 16px rgba(107, 158, 120, 0.4);
    }

    #waterToast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Rename dialog overlay */
    .rename-overlay {
      position: fixed;
      inset: 0;
      background: rgba(61, 46, 30, 0.35);
      backdrop-filter: blur(4px);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .rename-dialog {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 28px 24px;
      max-width: 340px;
      width: 100%;
      box-shadow: 0 12px 40px rgba(139, 109, 82, 0.2);
      border: 1px solid var(--border);
      text-align: center;
    }

    .rename-dialog .rename-emoji { font-size: 2rem; margin-bottom: 12px; }
    .rename-dialog h3 { font-size: 1.1rem; color: var(--text); margin-bottom: 8px; }
    .rename-dialog p { font-size: 0.9rem; color: var(--text-light); margin-bottom: 18px; line-height: 1.5; }

    .rename-dialog input {
      margin-bottom: 16px;
      text-align: center;
      font-size: 1.05rem;
      font-weight: 600;
    }

    .rename-dialog-btns { display: flex; gap: 10px; }

    .rename-keep-btn {
      background: var(--cream);
      color: var(--text);
      box-shadow: none;
      border: 2px solid var(--border);
    }

    .rename-keep-btn:hover {
      background: var(--border);
      transform: translateY(-1px);
      box-shadow: none;
    }

    .rename-confirm-btn {
      background: linear-gradient(135deg, var(--primary) 0%, var(--sage-dark) 100%);
    }

    /* Rename reaction toast */
    #renameToast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--primary);
      color: white;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 0.9rem;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1000;
      pointer-events: none;
      box-shadow: 0 4px 16px rgba(124, 140, 94, 0.4);
      max-width: 320px;
      text-align: center;
    }

    #renameToast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .plants-list { display: flex; flex-direction: column; gap: 16px; }

    .plant-card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 4px 16px var(--card-shadow);
      border: 1px solid var(--border);
      transition: all 0.3s;
    }

    .plant-card:hover {
      box-shadow: 0 8px 24px var(--card-shadow);
      transform: translateY(-2px);
    }

    .plant-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .plant-info { flex: 1; }

    .plant-name {
      font-weight: 700;
      font-size: 1.15rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .name-edit-btn {
      background: none;
      border: none;
      padding: 2px 6px;
      cursor: pointer;
      font-size: 0.85rem;
      opacity: 0.4;
      transition: opacity 0.2s;
      width: auto;
      box-shadow: none;
    }

    .name-edit-btn:hover {
      opacity: 1;
      transform: none;
      box-shadow: none;
      background: none;
    }

    .plant-species { color: var(--text-light); font-size: 0.85rem; font-style: italic; margin-top: 2px; }

    .watered-badge {
      background: var(--water);
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .watered-today { background: var(--success); }

    .care-details { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 14px; }

    .care-item { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; color: var(--text-light); }
    .care-icon { font-size: 1rem; }

    .water-btn {
      width: auto;
      padding: 12px 24px;
      background: var(--water);
      font-size: 0.9rem;
      border-radius: 12px;
    }

    .water-btn:hover { background: #5a8d67; }
    .water-btn.watered { background: var(--success); }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-light); }
    .empty-icon { font-size: 4rem; margin-bottom: 16px; }

    .delete-btn {
      background: transparent;
      color: var(--terracotta);
      padding: 4px 8px;
      width: auto;
      font-size: 0.8rem;
      box-shadow: none;
    }

    .delete-btn:hover { background: #fee; color: #c00; transform: none; box-shadow: none; }

    .care-expanded {
      background: #f8faf6;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 14px;
    }

    .care-expanded-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .care-detail-row { display: flex; gap: 12px; margin-bottom: 8px; font-size: 0.85rem; }
    .care-detail-row:last-child { margin-bottom: 0; }
    .care-detail-label { min-width: 80px; color: var(--text-light); font-weight: 500; }
    .care-detail-value { color: var(--text); }

    .leaf-signals { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }

    .leaf-signal { padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; }
    .leaf-signal.underwater { background: #fff3e0; color: #e65100; }
    .leaf-signal.overwater { background: #e3f2fd; color: #1565c0; }

    .personality-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 8px;
    }

    .personality-badge.dramatic { background: linear-gradient(135deg, #fce4ec 0%, #f8bbd9 100%); color: #c2185b; }
    .personality-badge.chill { background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%); color: #2e7d32; }
    .personality-badge.resilient { background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%); color: #ef6c00; }
    .personality-badge.diva { background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 100%); color: #7b1fa2; }
    .personality-badge.mysterious { background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 100%); color: #00838f; }
    .personality-badge.cheerful { background: linear-gradient(135deg, #fce4ec 0%, #ffcdd2 100%); color: #d81b60; }

    .mood-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .mood-indicator.thriving { background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%); color: #2e7d32; }
    .mood-indicator.happy { background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%); color: #1565c0; }
    .mood-indicator.okay { background: linear-gradient(135deg, #fff8e1 0%, #ffecb3 100%); color: #f57f17; }
    .mood-indicator.droopy { background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%); color: #e65100; }
    .mood-indicator.struggling { background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%); color: #c62828; }

    .voice-message {
      font-style: italic;
      font-size: 0.9rem;
      color: var(--text-light);
      padding: 10px 14px;
      background: var(--cream);
      border-radius: 12px;
      margin-bottom: 14px;
      border-left: 3px solid var(--sage);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌱 Florish</h1>
    
    <div class="add-plant-form">
      <h2>Add New Plant</h2>
      <div class="form-group">
        <label for="species">Species</label>
        <div class="species-group">
          <input type="text" id="species" placeholder="e.g., Monstera Deliciosa" autocomplete="off">
          <div id="suggestions" class="suggestion-box"></div>
        </div>
      </div>
      <div class="form-group">
        <label for="nickname">Give them a name (optional but highly recommended)</label>
        <div class="nickname-group">
          <input type="text" id="nickname" placeholder="e.g., Monty… or let us choose 🎲">
          <button type="button" class="surprise-btn" onclick="surpriseMe()">🎲 Surprise Me</button>
        </div>
      </div>
      <div class="form-group">
        <label>Care Needs</label>
        <div class="care-info">
          <div class="care-display water">
            <span class="care-label">💧 Thirst Level</span>
            <span id="waterDisplay" class="care-value">—</span>
          </div>
          <div class="care-display light">
            <span class="care-label">☀️ Sun Vibe</span>
            <span id="lightDisplay" class="care-value">—</span>
          </div>
          <div class="care-display soil">
            <span class="care-label">🌱 Soil Mood</span>
            <span id="soilDisplay" class="care-value">—</span>
          </div>
        </div>
      </div>
      <button id="addPlantBtn" onclick="addPlant()">Add Plant</button>
    </div>

    <div id="plantsList" class="plants-list"></div>
  </div>

  <!-- Water confirmation toast -->
  <div id="waterToast"></div>

  <!-- Rename reaction toast -->
  <div id="renameToast"></div>

  <script>
    const plantDatabase = {

      'Monstera Adansonii': { waterDays: 5, light: 'Bright Indirect', soil: 'Well-draining', waterMethod: 'top', waterNotes: 'Water when top inch is dry. This species is thirstier than M. Deliciosa due to smaller leaves.', soilDrynessCheck: 'Check top inch of soil; water when it feels slightly dry. More frequent watering needed.', leafSignals: { underwater: 'Leaves droop significantly, holes may not develop fully', overwater: 'Yellow leaves, soft black stems' }, waterAmount: 'moderate', personality: 'Diva' },

    let plants = JSON.parse(localStorage.getItem('plants') || '[]');
    let currentSuggestion = null;

    function savePlants() { localStorage.setItem('plants', JSON.stringify(plants)); }
    function getToday() { return new Date().toDateString(); }

    // Auto-suggest
    const speciesInput = document.getElementById('species');
    const suggestionsBox = document.getElementById('suggestions');

    speciesInput.addEventListener('input', function() {
      const query = this.value.toLowerCase().trim();
      if (query.length < 2) { suggestionsBox.classList.remove('show'); return; }
      const matches = Object.keys(plantDatabase).filter(name => name.toLowerCase().includes(query)).slice(0, 8);
      if (matches.length === 0) { suggestionsBox.classList.remove('show'); return; }
      suggestionsBox.innerHTML = matches.map(name => {
        const plant = plantDatabase[name];
        return `<div class="suggestion-item" data-name="${name}"><strong>${name}</strong><br><small>💧 ${plant.waterDays} days • ☀️ ${plant.light}</small></div>`;
      }).join('');
      suggestionsBox.classList.add('show');
    });

    suggestionsBox.addEventListener('click', function(e) {
      const item = e.target.closest('.suggestion-item');
      if (item) {
        const name = item.dataset.name;
        speciesInput.value = name;
        applyPlantCare(plantDatabase[name]);
        suggestionsBox.classList.remove('show');
      }
    });

    document.addEventListener('click', function(e) {
      if (!e.target.closest('.species-group')) suggestionsBox.classList.remove('show');
    });

    function applyPlantCare(plant) {
      document.getElementById('waterDisplay').textContent = `Every ${plant.waterDays} days`;
      document.getElementById('lightDisplay').textContent = plant.light;
      document.getElementById('soilDisplay').textContent = plant.soil;
      currentSuggestion = plant;
    }

    // Surprise Me
    const surpriseNames = {
      'Dramatic': ['Ophelia', 'Valentino', 'Seraphina', 'Dramothy', 'Celestine', 'Maximilian', 'Cordelia', 'Donatello', 'Isadora', 'Bartholomew'],
      'Chill': ['Moss', 'Sunny', 'Bean', 'River', 'Pebble', 'Sage', 'Mellow', 'Drift', 'Haze', 'Breezy'],
      'Resilient': ['Flint', 'Brix', 'Grit', 'Sterling', 'Boulder', 'Dune', 'Wren', 'Forrest', 'Sable', 'Ember'],
      'Diva': ['Cleopatra', 'Lux', 'Velvet', 'Versace', 'Duchess', 'Mystique', 'Bellissima', 'Reign', 'Opulence', 'Coco'],
      'Mysterious': ['Vesper', 'Orion', 'Solenne', 'Wraith', 'Nyx', 'Echo', 'Caelum', 'Mireille', 'Shade', 'Cinder'],
      'Cheerful': ['Sunny', 'Pip', 'Buttercup', 'Blossom', 'Marigold', 'Cheerio', 'Tansy', 'Zinnia', 'Poppy', 'Goldie']

    function surpriseMe() {
      const species = document.getElementById('species').value.trim();
      const suggested = plantDatabase[species] || currentSuggestion;
      const personality = suggested?.personality || 'Cheerful';
      const names = surpriseNames[personality] || surpriseNames['Cheerful'];
      document.getElementById('nickname').value = names[Math.floor(Math.random() * names.length)];
    }

    // Leaf float animation
    function spawnLeaf(x, y) {
      const leaf = document.createElement('div');
      leaf.className = 'leaf-float';
      leaf.textContent = ['🌿', '🍃', '🌱'][Math.floor(Math.random() * 3)];
      leaf.style.left = (x - 12) + 'px';
      leaf.style.top = (y - 12) + 'px';
      document.body.appendChild(leaf);
      setTimeout(() => leaf.remove(), 900);
    }

    // Toast helper
    function showToast(id, message, duration = 2200) {
      const toast = document.getElementById(id);
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), duration);
    }

    // Add plant with micro-interactions
    function addPlant() {
      const species = document.getElementById('species').value.trim();
      const nickname = document.getElementById('nickname').value.trim();
      const suggested = plantDatabase[species] || currentSuggestion;

      if (!species) { alert('Please enter a species name'); return; }

      // Button bounce + leaf
      const btn = document.getElementById('addPlantBtn');
      btn.classList.add('btn-bounce');
      setTimeout(() => btn.classList.remove('btn-bounce'), 400);

      const rect = btn.getBoundingClientRect();
      for (let i = 0; i < 3; i++) {
        setTimeout(() => spawnLeaf(
          rect.left + Math.random() * rect.width,
          rect.top + window.scrollY
        ), i * 120);
      }

      const plant = {
        id: Date.now(),
        species,
        nickname: nickname || null,
        waterDays: suggested?.waterDays || 7,
        lightNeeds: suggested?.light || 'Medium',
        soilType: suggested?.soil || 'Regular',
        waterMethod: suggested?.waterMethod || 'top',
        waterNotes: suggested?.waterNotes || 'Water thoroughly, let drain',
        soilDrynessCheck: suggested?.soilDrynessCheck || 'Check top inch; water when dry',
        leafSignals: suggested?.leafSignals || { underwater: 'Wilting leaves', overwater: 'Yellow leaves' },
        waterAmount: suggested?.waterAmount || 'moderate',
        lastWatered: null,
        isNew: true
      };

      plants.push(plant);
      savePlants();
      renderPlants();

      const displayName = nickname || species;
      showToast('waterToast', `🌱 ${displayName} has joined your garden!`, 2500);

      document.getElementById('species').value = '';
      document.getElementById('nickname').value = '';
      document.getElementById('waterDisplay').textContent = '—';
      document.getElementById('lightDisplay').textContent = '—';
      document.getElementById('soilDisplay').textContent = '—';
      currentSuggestion = null;
    }

    function waterPlant(id) {
      const plant = plants.find(p => p.id === id);
      if (plant) {
        plant.lastWatered = getToday();
        savePlants();
        renderPlants();
        const displayName = plant.nickname || plant.species;
        const personality = getPlantPersonality(plant.species);
        const waterReactions = {
          'Dramatic': `${displayName} has been watered. Balance is restored. 💧`,
          'Chill': `${displayName} got some water. All good. 💧`,
          'Resilient': `${displayName} watered. Keep it up. 💧`,
          'Diva': `${displayName} is hydrated. Obviously. 💧`,
          'Mysterious': `${displayName} has received water. The leaves are pleased. 💧`,
          'Cheerful': `You watered ${displayName}! They're so happy right now! 💧`
        };
        showToast('waterToast', waterReactions[personality] || `You watered ${displayName} 💧`);
      }
    }

    function deletePlant(id) {
      if (confirm('Remove this plant from your garden?')) {
        plants = plants.filter(p => p.id !== id);
        savePlants();
        renderPlants();
      }
    }

    // Rename feature
    function startRename(id) {
      const plant = plants.find(p => p.id === id);
      if (!plant) return;
      const currentName = plant.nickname || plant.species;

      const overlay = document.createElement('div');
      overlay.className = 'rename-overlay';
      overlay.innerHTML = `
        <div class="rename-dialog">
          <div class="rename-emoji">✏️</div>
          <h3>Rename ${currentName}?</h3>
          <p>Are you sure? <strong>${currentName}</strong> has grown attached to this name…</p>
          <input type="text" id="renameInput" value="${currentName}" placeholder="New name...">
          <div class="rename-dialog-btns">
            <button class="rename-keep-btn" onclick="closeRenameDialog()">Keep it</button>
            <button class="rename-confirm-btn" onclick="confirmRename(${id})">Rename anyway</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
      overlay.id = 'renameOverlay';
      setTimeout(() => document.getElementById('renameInput')?.focus(), 100);
    }

    function closeRenameDialog() {
      document.getElementById('renameOverlay')?.remove();
    }

    function confirmRename(id) {
      const newName = document.getElementById('renameInput')?.value.trim();
      if (!newName) return;
      const plant = plants.find(p => p.id === id);
      if (!plant) return;
      plant.nickname = newName;
      savePlants();
      closeRenameDialog();
      renderPlants();
      const personality = getPlantPersonality(plant.species);
      const renameReactions = {
        'Dramatic': `"A new name. How theatrical. I love it."`,
        'Chill': `"Cool. Works for me."`,
        'Resilient': `"Name's just a name. I'll answer to it."`,
        'Diva': `"If you must. Make it fabulous."`,
        'Mysterious': `"Names are vessels. This one will do."`,
        'Cheerful': `"Oh I love it! Fresh start, let's grow!"`
      };
      showToast('renameToast', renameReactions[personality] || `"A new name. I like it."`, 3000);
    }

    };

    function getPlantPersonality(species) {
      const dbEntry = plantDatabase[species];
      if (dbEntry?.personality) return dbEntry.personality;
      if (species.toLowerCase().includes('cactus') || species.toLowerCase().includes('succulent')) return 'Resilient';
      if (species.toLowerCase().includes('pothos') || species.toLowerCase().includes('snake') || species.toLowerCase().includes('zz')) return 'Chill';
      if (species.toLowerCase().includes('monstera') || species.toLowerCase().includes('bird of paradise')) return 'Diva';
      if (species.toLowerCase().includes('orchid') || species.toLowerCase().includes('fig')) return 'Dramatic';
      if (species.toLowerCase().includes('air plant') || species.toLowerCase().includes('venus')) return 'Mysterious';
      return 'Cheerful';
    }

    function getPlantMood(plant) {
      if (!plant.lastWatered) return 'Struggling';
      const daysSince = Math.floor((new Date() - new Date(plant.lastWatered)) / (1000 * 60 * 60 * 24));
      const s = plant.waterDays || 7;
      if (daysSince <= s) return 'Thriving';
      if (daysSince === s + 1) return 'Happy';
      if (daysSince === s + 2) return 'Okay';
      if (daysSince >= s + 3 && daysSince <= s + 4) return 'Droopy';
      return 'Struggling';
    }

    function renderPlants() {
      const list = document.getElementById('plantsList');
      if (plants.length === 0) {
        list.innerHTML = `<div class="empty-state"><div class="empty-icon">🌿</div><p>No plants yet. Add your first plant above!</p></div>`;
        return;
      }

      list.innerHTML = plants.map((plant, index) => {
        const care = formatCare(plant);
        const isWateredToday = plant.lastWatered === getToday();
        const leafSignals = plant.leafSignals || { underwater: 'Wilting leaves', overwater: 'Yellow leaves' };
        const personality = getPlantPersonality(plant.species);
        const mood = getPlantMood(plant);
        const personalityEmoji = personalityEmojis[personality] || '🌿';
        const moodEmoji = moodEmojis[mood] || '🌱';
        const messageArray = voiceMessages[personality]?.[mood] || ["I'm just a plant doing plant things."];
        const voiceMessage = messageArray[Math.floor(Math.random() * messageArray.length)];
        const displayName = plant.nickname || plant.species;
        const subText = plant.nickname ? plant.species : '';
        const isNew = plant.isNew;
        if (plant.isNew) { plant.isNew = false; }

        return `
          <div class="plant-card ${isNew ? 'plant-card-new' : ''}">
            <div class="plant-card-header">
              <div class="plant-info">
                <span class="personality-badge ${personality.toLowerCase()}">${personalityEmoji} ${personality}</span>
                <div class="plant-name">
                  ${displayName}
                  <button class="name-edit-btn" onclick="startRename(${plant.id})" title="Rename">✏️</button>
                </div>
                ${subText ? `<div class="plant-species">${subText}</div>` : ''}
              </div>
              ${isWateredToday ? '<span class="watered-badge watered-today">✓ Watered</span>' : ''}
            </div>
            <div class="mood-indicator ${mood.toLowerCase()}">${moodEmoji} ${mood}</div>
            <div class="voice-message">"${voiceMessage}"</div>
            <div class="care-details">
              <span class="care-item"><span class="care-icon">💧</span> ${care.water}</span>
              <span class="care-item"><span class="care-icon">☀️</span> ${care.light}</span>
              <span class="care-item"><span class="care-icon">🪴</span> ${care.soil}</span>
            </div>
            <div class="care-expanded">
              <div class="care-expanded-title">Care Details</div>
              <div class="care-detail-row">
                <span class="care-detail-label">Method:</span>
                <span class="care-detail-value">${plant.waterMethod === 'top' ? 'Water from top' : plant.waterMethod === 'bottom' ? 'Water from bottom' : 'Top & center cup'}</span>
              </div>
              <div class="care-detail-row">
                <span class="care-detail-label">Amount:</span>
                <span class="care-detail-value">${plant.waterAmount === 'thorough' ? 'Thorough (soak)' : plant.waterAmount === 'moderate' ? 'Moderate' : 'Light (sparingly)'}</span>
              </div>
              <div class="care-detail-row">
                <span class="care-detail-label">How to check:</span>
                <span class="care-detail-value">${plant.soilDrynessCheck || 'Check top inch; water when dry'}</span>
              </div>
              <div class="care-detail-row">
                <span class="care-detail-label">Notes:</span>
                <span class="care-detail-value">${plant.waterNotes || 'Water thoroughly, let drain'}</span>
              </div>
              <div class="care-detail-row" style="flex-direction: column; gap: 4px;">
                <span class="care-detail-label">Leaf signals:</span>
                <div class="leaf-signals">
                  <span class="leaf-signal underwater">💧 ${leafSignals.underwater}</span>
                  <span class="leaf-signal overwater">🌧️ ${leafSignals.overwater}</span>
                </div>
              </div>
            </div>
            <div style="display: flex; gap: 10px;">
              <button class="water-btn ${isWateredToday ? 'watered' : ''}" onclick="waterPlant(${plant.id})">
                ${isWateredToday ? '✓ Watered Today' : '💧 Mark Watered'}
              </button>
              <button class="delete-btn" onclick="deletePlant(${plant.id})">Remove</button>
            </div>
          </div>
        `;
      }).join('');
    }

    renderPlants();
  </script>
</body>
</html>
